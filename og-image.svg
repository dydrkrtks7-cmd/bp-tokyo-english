<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b71c1c"/>
      <stop offset="100%" stop-color="#880e4f"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd600"/>
      <stop offset="100%" stop-color="#880e4f"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="1091" cy="684" r="36" fill="#880e4f" opacity="0.15"/>
    <circle cx="82" cy="13" r="37" fill="#880e4f" opacity="0.11"/>
    <circle cx="1087" cy="684" r="37" fill="#880e4f" opacity="0.14"/>
    <circle cx="281" cy="388" r="91" fill="#880e4f" opacity="0.10"/>
    <circle cx="1136" cy="-78" r="95" fill="#880e4f" opacity="0.07"/>
    <circle cx="1149" cy="5" r="97" fill="#880e4f" opacity="0.05"/>
    <rect x="1168" y="615" width="92" height="41" rx="8" fill="#b71c1c" opacity="0.12" transform="rotate(40, -7, 444)"/>
    <rect x="239" y="674" width="21" height="82" rx="8" fill="#b71c1c" opacity="0.04" transform="rotate(17, 74, 169)"/>
    <rect x="966" y="364" width="96" height="53" rx="8" fill="#b71c1c" opacity="0.10" transform="rotate(28, -11, 361)"/>
    <rect x="305" y="531" width="74" height="57" rx="8" fill="#b71c1c" opacity="0.09" transform="rotate(25, 357, 167)"/>
    <rect x="1228" y="-97" width="27" height="81" rx="8" fill="#b71c1c" opacity="0.03" transform="rotate(14, 618, 584)"/>
    <rect x="570" y="269" width="49" height="75" rx="8" fill="#b71c1c" opacity="0.15" transform="rotate(37, 1284, -21)"/>
    <rect x="519" y="562" width="51" height="75" rx="8" fill="#b71c1c" opacity="0.04" transform="rotate(10, 23, 124)"/>
    <rect x="219" y="343" width="87" height="38" rx="8" fill="#b71c1c" opacity="0.05" transform="rotate(21, 1047, 231)"/>
    <polygon points="-4,183 25,241 -33,241" fill="#880e4f" opacity="0.13"/>
    <polygon points="1216,424 1300,592 1132,592" fill="#880e4f" opacity="0.13"/>
    <polygon points="-61,653 10,795 -132,795" fill="#880e4f" opacity="0.06"/>
    <polygon points="427,550 447,590 407,590" fill="#880e4f" opacity="0.05"/>

  <!-- Wave at bottom -->
  <path d="M0,560 C360,595 840,525 1200,560 L1200,630 L0,630Z" fill="#880e4f" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    합정 노래방 추천정보
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    합정 — 노래방
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#ffd600" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#ffd600" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    합정 합정 노래방 추천정보 — 노래방
  </text>
</svg>